<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — VH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0810 0%, #3d0f1e 60%, #1a0810 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-area .logo-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #1a0810, #3d0f1e);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
    }
    .logo-area h1 { font-size: 22px; font-weight: 900; color: #1a0810; margin: 0; }
    .logo-area p  { font-size: 13px; color: #888; margin: 4px 0 0; }
    .form-label   { font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .5px; }
    .form-select, .form-control {
      border: 2px solid #e9ecef; border-radius: 10px;
      padding: 10px 14px; font-size: 14px;
      transition: border-color .15s;
    }
    .form-select:focus, .form-control:focus {
      border-color: #c9a066; box-shadow: 0 0 0 3px rgba(201,160,102,.15);
    }
    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #1a0810, #3d0f1e);
      color: #c9a066; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: opacity .15s; letter-spacing: .3px;
    }
    .btn-login:hover { opacity: .88; }
    .first-time-badge {
      background: #fef3c7; border: 1px solid #fbbf24;
      border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: #92400e; margin-bottom: 16px;
    }
    .toggle-pw { cursor: pointer; color: #aaa; }
    .toggle-pw:hover { color: #555; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <div class="logo-icon">🏆</div>
    <h1>Plataforma VH</h1>
    <p>Ingresá con tu nombre y contraseña</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 px-3" style="border-radius:8px;font-size:13px;">
    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
  </div>
  {% endif %}

  {% if first_time %}
  <div class="first-time-badge">
    <i class="bi bi-star-fill me-1"></i><strong>¡Primera vez!</strong>
    Creá tu contraseña para ingresar. La vas a usar siempre que entres.
  </div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Tu nombre</label>
      <select name="name" class="form-select" required onchange="checkFirstTime(this)">
        <option value="">— Seleccioná tu nombre —</option>
        {% for v in vendors %}
        <option value="{{ v.name }}">{{ v.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label" id="pw-label">
        {% if first_time %}Crear contraseña{% else %}Contraseña{% endif %}
      </label>
      <div class="input-group">
        <input type="password" name="password" id="pw-input" class="form-control"
               placeholder="{% if first_time %}Mínimo 4 caracteres{% else %}Tu contraseña{% endif %}"
               autocomplete="{% if first_time %}new-password{% else %}current-password{% endif %}">
        <span class="input-group-text toggle-pw" onclick="togglePw('pw-input', this)">
          <i class="bi bi-eye"></i>
        </span>
      </div>
    </div>

    {% if first_time %}
    <div class="mb-4">
      <label class="form-label">Confirmar contraseña</label>
      <div class="input-group">
        <input type="password" name="confirm" id="pw-confirm" class="form-control" placeholder="Repetí la contraseña">
        <span class="input-group-text toggle-pw" onclick="togglePw('pw-confirm', this)">
          <i class="bi bi-eye"></i>
        </span>
      </div>
    </div>
    {% else %}
    <div class="mb-4"></div>
    {% endif %}

    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>
      {% if first_time %}Crear contraseña e ingresar{% else %}Ingresar{% endif %}
    </button>
  </form>

  <div style="text-align:center;margin-top:18px;font-size:11px;color:#bbb;">
    ¿Olvidaste tu contraseña? Contactá a tu coach.
  </div>
</div>

<script>
function togglePw(id, icon) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  icon.querySelector('i').className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
