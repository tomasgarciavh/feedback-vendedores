version: "3.9"

services:
  app:
    build: .
    container_name: feedback-vendedores
    ports:
      - "5000:5000"
    volumes:
      # Google service account credentials (must exist before starting)
      - ./credentials.json:/app/credentials.json:ro
      # SQLite database persisted on the host
      - ./feedback.db:/app/feedback.db
      # Drive polling state file
      - ./drive_state.json:/app/drive_state.json
      # Environment variables
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
